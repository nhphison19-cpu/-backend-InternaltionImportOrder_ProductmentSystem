openapi: 3.0.0
info:
  title: Import Order Management API
  version: 1.0.0
  description: API quản lý đơn hàng nhập khẩu quốc tế.

paths:
  /api/import-orders:
    post:
      summary: Tạo đơn hàng nhập khẩu mới
      tags: [ImportOrders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportOrder'
      responses:
        201:
          description: Đơn hàng tạo thành công
    get:
      summary: Lấy danh sách đơn hàng (có phân trang)
      tags: [ImportOrders]
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        200:
          description: Thành công

  /api/import-orders/{id}/status:
    patch:
      summary: Cập nhật trạng thái đơn hàng
      tags: [ImportOrders]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [DRAFT, APPROVED, COMPLETED, CANCELLED] }
      responses:
        200:
          description: Cập nhật thành công

components:
  schemas:
    ImportOrder:
      type: object
      required: [orderNumber, supplierId, warehouseId]
      properties:
        orderNumber: { type: string }
        supplierId: { type: string }
        warehouseId: { type: string }
        incoterm: { type: string }
        items:
          type: array
          items:
            type: object
            properties:
              productId: { type: string }
              quantity: { type: number }
              unitPrice: { type: number }